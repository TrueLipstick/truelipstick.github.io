<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" width="640" height="560" role="img" aria-labelledby="troll-title troll-desc">
  <title id="troll-title">Schrödingers troll</title>
  <desc id="troll-desc">En logisk triangel vars tre vägar — gör inget, gör något, kritiserar — alla leder till domen att triangeln är sluten.</desc>
  <style>
    .paper   { fill: #faf6ed; }
    .edge    { stroke: #a61c3a; stroke-width: 1.6; fill: none; }
    .halo    { fill: #a61c3a; opacity: 0.12; }
    .core    { fill: #a61c3a; }
    .centerhalo { fill: #502846; opacity: 0.08; }
    .title   { fill: #1a1020; font-family: "Fraunces", Georgia, serif; font-size: 18px; }
    .label   { fill: #1a1020; opacity: 0.85; font-family: "IBM Plex Mono", monospace; font-size: 12px; letter-spacing: 0.08em; }
    .gloss   { fill: #7a5870; font-family: "Newsreader", Georgia, serif; font-style: italic; font-size: 11px; }
    .verdict { fill: #781328; font-family: "IBM Plex Mono", monospace; font-size: 11px; letter-spacing: 0.12em; }
    .formula { fill: #7a5870; opacity: 0.70; font-family: "IBM Plex Mono", monospace; font-size: 9px; }
    @media (prefers-color-scheme: dark) {
      .paper      { fill: #201829; }
      .edge       { stroke: #e35d76; }
      .halo       { fill: #e35d76; opacity: 0.15; }
      .core       { fill: #e35d76; }
      .centerhalo { fill: #502846; opacity: 0.12; }
      .title      { fill: #f0e8f2; }
      .label      { fill: #f0e8f2; opacity: 0.85; }
      .gloss      { fill: #c4a8c0; }
      .verdict    { fill: #e35d76; }
      .formula    { fill: #c4a8c0; opacity: 0.70; }
    }
  </style>

  <rect class="paper" x="0" y="0" width="640" height="560" />

