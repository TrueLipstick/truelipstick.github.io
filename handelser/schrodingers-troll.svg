  <!-- Centrumhalo -->
  <ellipse class="centerhalo" cx="320.0" cy="230.0" rx="45" ry="25" />

  <!-- Hörnnoder: superposition (halo + kärna) -->
  <circle class="halo" cx="132.61" cy="108.00" r="16" />
  <circle class="core" cx="132.61" cy="108.00" r="5" />
  <circle class="halo" cx="530.03" cy="153.28" r="16" />
  <circle class="core" cx="530.03" cy="153.28" r="5" />
  <circle class="halo" cx="297.36" cy="428.71" r="16" />
  <circle class="core" cx="297.36" cy="428.71" r="5" />

  <!-- Rubrik -->
  <text class="title" x="320" y="60" text-anchor="middle">Schrödingers troll</text>

  <!-- Hörnetiketter + förklaringar -->
  <!-- GÖR INGET: högerkantsanpassad, etiketten till vänster om noden -->
  <text class="label" x="104.6" y="112.0" text-anchor="end">GÖR INGET</text>
  <text class="gloss" x="104.6" y="130.0" text-anchor="end">ser ut som ett</text>
  <text class="gloss" x="104.6" y="144.0" text-anchor="end">passivt alt-konto</text>

  <!-- GÖR NÅGOT: vänsterkantsanpassad, etiketten till höger om noden -->
  <text class="label" x="558.0" y="157.3" text-anchor="start">GÖR NÅGOT</text>
  <text class="gloss" x="558.0" y="175.3" text-anchor="start">för kort historik</text>
  <text class="gloss" x="558.0" y="189.3" text-anchor="start">i servern</text>

  <!-- KRITISERAR: centrerad nedanför noden -->
  <text class="label" x="297.4" y="462.7" text-anchor="middle">KRITISERAR</text>
  <text class="gloss" x="297.4" y="480.7" text-anchor="middle">tolkas som brigading</text>

  <!-- Centrumtext: domen -->
  <text class="verdict" x="320.0" y="226.0" text-anchor="middle">TRIANGELN</text>
  <text class="verdict" x="320.0" y="242.0" text-anchor="middle">ÄR SLUTEN</text>

  <!-- Bayes-formel -->
  <text class="formula" x="320.0" y="260.0" text-anchor="middle">P(troll | ny användare) = 1</text>
</svg>
