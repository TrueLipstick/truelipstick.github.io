<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- ============================================================
       LAGER-2-SANERING (mänsklig, vid författande av KÄLLAN i _kall/):
       Skriptet (render.py) byter bara namn → koder (lager 1). De
       röjande omständigheterna nedan måste en människa ha strukit eller
       skrivit om i källan INNAN render, annars läcker de i den publika
       filen. Skriptet kan inte se dem — det finns inget mönster att matcha.

       □ Yrken/titlar som pekar ut en kodad person?
       □ Orter, avstånd, geografiska ledtrådar?
       □ Årtal/perioder som smalnar av till en individ?
       □ Namngivna tredje personer — skyddsvärda eller offentliga?
       □ Privata förhållanden (familj, relationer, hälsa) utan relevans?
       □ Unika händelser bara en person kan kopplas till?
       ============================================================ -->
  <title>Titel på inlägget · 💄 The Lipstick Web</title>
  <link rel="stylesheet" href="../style.css">
<script data-goatcounter="https://truelipstick.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <main class="wrap">

    <!-- Brödsmula: byt andra länkens TEXT + HREF till inläggets egen kategori.
         Hem pekar alltid på roten (../). Andra länken pekar på kategorimappen:
           Redaktörsnoter  → href="../redaktorsnoter/"  text "Redaktörsnoter"
           Händelser       → href="../handelser/"       text "Händelser"
           Samtal          → href="../samtal/"          text "Samtal"
         OBS: href är ../<kategori>/ (inte ./) eftersom inläggssidan ligger
         I kategorimappen — ./ skulle peka på inlägget självt.
         Lämna inte kvar platshållaren nedan. -->
    <nav class="crumbs" aria-label="Brödsmulor">
      <a href="../">💄 Hem</a><span aria-hidden="true">›</span><a href="../KATEGORI/">Kategori</a>
    </nav>

    <header class="masthead">
      <p class="eyebrow">Kategori · ÅÅÅÅ-MM-DD</p>
      <h1 class="site-title" style="font-size:clamp(2rem,5vw,3rem)">Titel på inlägget</h1>
      <p class="lede">En rad om vad det här är, för den som landar direkt på sidan.</p>
    </header>

    <!-- ============================================================
         FUTABA / KEPLER: välj EN av de två metoderna nedan.

         METOD A — inbäddad artefakt (rekommenderas för tidslinjer,
         samtal och allt som har egen CSS/JS). Lägg artefaktfilen i
         samma kategorimapp, t ex handelser/min-tidslinje.html, och
         peka iframens src dit. Isolerad, krockar aldrig med stilmallen.
         Justera height efter innehållet.
         ============================================================ -->
    <div class="artifact-frame">
      <iframe src="min-artefakt.html" height="640"
              title="Inbäddad artefakt" loading="lazy"></iframe>
    </div>

    <!-- ============================================================
         METOD B — ren text/prosa direkt i sidan. Ta bort .artifact-frame
         ovan och skriv i stället här. Ärver stilmallens typografi.

         <div class="prose">
           <p>Första stycket.</p>
           <p>Andra stycket.</p>
         </div>
         ============================================================ -->

    <footer class="foot">
      <p>💄 The Lipstick Web</p>
    </footer>

  </main>
</body>
</html>
